        );
      }
      document.querySelectorAll("#gifCatTabs .picker-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll("#gifCatTabs .picker-tab")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          if (tab.dataset.cat === "recent") {
            const grid = document.getElementById("gifGrid");
            const recents = LS.get("mn_recentGifs", []);
            grid.innerHTML = recents.length
              ? recents
                  .map((url) => `<img src="${url}" data-url="${url}">`)
                  .join("")
              : `<p style="color:var(--text-muted)">No recent GIFs yet.</p>`;
            grid.querySelectorAll("img").forEach((img) =>
              img.addEventListener("click", async () => {
                await sendMessage(activeConvId, activeOtherUid, {
                  type: "image",
                  fileUrl: img.dataset.url,
                  fileName: "gif",
                });
                closeSheet("mediaPickerScrim", "mediaPicker");
              }),
            );
          } else {
            fetchTrendingGifs();
          }
        });
      });
      document.getElementById("gifSearch").addEventListener(
        "input",
        debounce(async (e) => {
          const term = e.target.value;
          if (!term) return fetchTrendingGifs();
          const res = await fetch(
            `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(term)}&limit=15`,
          );
          const json = await res.json();
          renderGifGrid(json.data);
        }, 300),
      );

      // ========== WALLPAPER ==========
      function applyWallpaperToChatBody(url, settings = {}) {
        currentWallpaperUrl = url || "";
        const s = {
          blur: 0,
          bright: 100,
          overlay: 0,
          opacity: 100,
          ...settings,
        };
        wallpaperSliderState = s;
        if (url) {
          chatBody.style.backgroundImage = `url(${url})`;
          chatBody.classList.add("wallpaper-blur");
          chatBody.style.filter = `blur(${s.blur}px) brightness(${s.bright}%)`;
          chatBody.style.opacity = s.opacity / 100;
          chatBody.style.setProperty(
            "--wallpaper-overlay",
            `rgba(0,0,0,${s.overlay / 100})`,
          );
        } else {
          chatBody.style.backgroundImage = "";
          chatBody.classList.remove("wallpaper-blur");
          chatBody.style.filter = "";
          chatBody.style.opacity = 1;
          chatBody.style.setProperty("--wallpaper-overlay", "transparent");
        }
      }

      function openWallpaperSheet() {
        renderWallpaperGrid("presets");
        updateWallpaperPreview(currentWallpaperUrl);
        document.getElementById("blurSlider").value =
          wallpaperSliderState.blur ?? 0;
        document.getElementById("brightSlider").value =
          wallpaperSliderState.bright ?? 100;
        document.getElementById("overlaySlider").value =
          wallpaperSliderState.overlay ?? 0;
        document.getElementById("opacitySlider").value =
          wallpaperSliderState.opacity ?? 100;
        updateSliderLabels();
        openSheet("wallpaperScrim", "wallpaperSheet");
      }
      document
        .getElementById("wallpaperScrim")
        .addEventListener("click", () =>
          closeSheet("wallpaperScrim", "wallpaperSheet"),
        );

      function updateWallpaperPreview(url) {
        const preview = document.getElementById("wallpaperPreview");
        preview.style.backgroundImage = url ? `url(${url})` : "none";
        preview.style.background = url ? "" : "var(--surface-2)";
        applyPreviewFilters();
      }
      function applyPreviewFilters() {
        const preview = document.getElementById("wallpaperPreview");
        const overlay = document.getElementById("wpOverlay");
        const blur = document.getElementById("blurSlider").value;
        const bright = document.getElementById("brightSlider").value;
        const overlayVal = document.getElementById("overlaySlider").value;
        const opacityVal = document.getElementById("opacitySlider").value;
        preview.style.filter = `blur(${blur}px) brightness(${bright}%)`;
        preview.style.opacity = opacityVal / 100;
        overlay.style.background = `rgba(0,0,0,${overlayVal / 100})`;
      }
      function updateSliderLabels() {
        document.getElementById("blurVal").textContent =
          document.getElementById("blurSlider").value + "px";
        document.getElementById("brightVal").textContent =
          document.getElementById("brightSlider").value + "%";
        document.getElementById("overlayVal").textContent =
          document.getElementById("overlaySlider").value + "%";
        document.getElementById("opacityVal").textContent =
          document.getElementById("opacitySlider").value + "%";
        applyPreviewFilters();
      }
      ["blurSlider", "brightSlider", "overlaySlider", "opacitySlider"].forEach(
        (id) => {
          document
            .getElementById(id)
            .addEventListener("input", updateSliderLabels);
        },
      );

      const WALLPAPER_FALLBACK_SVG =
        "data:image/svg+xml;charset=UTF-8," +
        encodeURIComponent(
          `<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='100%' height='100%' fill='#1c1c1e'/><text x='50%' y='50%' fill='#6b6b6b' font-size='13' font-family='sans-serif' text-anchor='middle' dy='.3em'>Unavailable</text></svg>`,
        );

      function renderWallpaperGrid(tab) {
        const grid = document.getElementById("wallpaperGrid");
        let list = [];
        if (tab === "presets") list = WALLPAPER_PRESETS;
        else if (tab === "recent") list = LS.get("mn_recentWallpapers", []);
        else if (tab === "favorites") list = [...favoriteWallpapers];
        grid.innerHTML = list.length
          ? list
              .map(
                (url) =>
                  `<img src="${url}" class="${url === currentWallpaperUrl ? "selected" : ""}" data-url="${url}">`,
              )
              .join("")
          : `<p style="color:var(--text-muted); grid-column:1/-1">Nothing here yet.</p>`;
        grid.querySelectorAll("img").forEach((img) => {
          img.addEventListener(
            "error",
            () => {
              img.src = WALLPAPER_FALLBACK_SVG;
            },
            { once: true },
          );
          img.addEventListener("click", () => {
            grid
              .querySelectorAll("img")
              .forEach((i) => i.classList.remove("selected"));
            img.classList.add("selected");
            currentWallpaperUrl = img.dataset.url;
            updateWallpaperPreview(currentWallpaperUrl);
          });
        });
      }
      document.querySelectorAll("[data-wtab]").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll("[data-wtab]")
            .forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          renderWallpaperGrid(tab.dataset.wtab);
        });
      });
      document
        .getElementById("wallpaperFile")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const dataUrl = await readFileAsDataURL(file);
          currentWallpaperUrl = dataUrl;
          updateWallpaperPreview(dataUrl);
        });
      document
        .getElementById("favWallpaperBtn")
        .addEventListener("click", () => {
          if (!currentWallpaperUrl) return;
          if (favoriteWallpapers.has(currentWallpaperUrl))
            favoriteWallpapers.delete(currentWallpaperUrl);
          else favoriteWallpapers.add(currentWallpaperUrl);
          LS.set("mn_favWallpapers", [...favoriteWallpapers]);
          showToast("Favorites updated");
        });
      document
        .getElementById("removeWallpaperBtn")
        .addEventListener("click", async () => {
          currentWallpaperUrl = "";
          updateWallpaperPreview("");
          await saveWallpaper();
        });
      document
        .getElementById("applyWallpaperBtn")
        .addEventListener("click", saveWallpaper);
      async function saveWallpaper() {
        if (!activeConvId) return;
        const settings = {
          blur: Number(document.getElementById("blurSlider").value),
          bright: Number(document.getElementById("brightSlider").value),
          overlay: Number(document.getElementById("overlaySlider").value),
          opacity: Number(document.getElementById("opacitySlider").value),
        };
        await updateDoc(doc(db, "conversations", activeConvId), {
          wallpaper: currentWallpaperUrl || "",
          wallpaperSettings: settings,
        });
        if (currentWallpaperUrl) {
          const recents = LS.get("mn_recentWallpapers", []);
          recents.unshift(currentWallpaperUrl);
          LS.set("mn_recentWallpapers", [...new Set(recents)].slice(0, 16));
        }
        applyWallpaperToChatBody(currentWallpaperUrl, settings);
        closeSheet("wallpaperScrim", "wallpaperSheet");
        showToast("Wallpaper updated");
      }

      // ========== PROFILE ==========
      document
        .getElementById("profileAvatarImg")
        .addEventListener("click", () =>
          document.getElementById("profileAvatarFile").click(),
        );
      document
        .getElementById("profileAvatarFile")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const dataUrl = await readFileAsDataURL(file);
          document.getElementById("profileAvatarImg").src = dataUrl;
          window.tempAvatar = dataUrl;
        });
      document.getElementById("saveProfileBtn").addEventListener("click", async () => {
  const newUsername = document.getElementById("profileUsername").value.trim();
  const newPhoto = window.tempAvatar; // the uploaded data URL

  // ---- 1. Update your own user document ----
  const updates = {};
  if (newUsername && newUsername !== profile.username) {
    updates.username = newUsername;
    profile.username = newUsername;
  }
  if (newPhoto) {
    updates.photoURL = newPhoto;
    profile.photoURL = newPhoto;
    window.tempAvatar = null;
  }

  if (Object.keys(updates).length > 0) {
    await updateDoc(doc(db, "users", user.uid), updates);
  }

  // ---- 2. Update participantInfo in every conversation you’re in ----
  try {
    const q = query(
      collection(db, "conversations"),
      where("participants", "array-contains", user.uid)
    );
    const snap = await getDocs(q);
    if (!snap.empty) {
      const batch = writeBatch(db);
      snap.forEach((convDoc) => {
        const ref = doc(db, "conversations", convDoc.id);
        const data = {};

        if (newUsername) {
          data[`participantInfo.${user.uid}.username`] = newUsername;
        }
        if (newPhoto) {
          data[`participantInfo.${user.uid}.photoURL`] = newPhoto;
        }

        if (Object.keys(data).length > 0) {
          batch.update(ref, data);
        }
      });
      await batch.commit();
    }
  } catch (err) {
    console.error("Failed to sync profile to conversations:", err);
    // still show toast – the avatar might not update for others instantly but
    // the user doc is correct, so it’s not fatal.
  }

  showToast("Profile saved");
  showList();
});

      // ========== LOGOUT ==========
      document
        .getElementById("vipLogoutBtn")
        .addEventListener("click", async () => {
          await logOut();
          location.href = "index.html";
        });

      // ========== NEW CHAT (full VIP member picker — fixed: previously always opened members[0]) ==========
      document
        .getElementById("newChatBtn")
        .addEventListener("click", async () => {
          const body = document.getElementById("vipMemberList");
          body.innerHTML = "Loading VIP members…";
          document.getElementById("newChatModal").classList.add("open");
          const members = await listVipMembers(user.uid);
          if (!members.length) {
            body.innerHTML = "<p>No other VIP members yet.</p>";
            return;
          }
          body.innerHTML = members
            .map(
              (m) => `
          <div class="vip-pick-item" data-uid="${m.uid}">
            <img class="avatar" style="width:44px;height:44px" src="${avatarUrl(m)}">
            <div>${escapeHtml(m.username || "Member")}</div>
          </div>`,
            )
            .join("");
          body.querySelectorAll(".vip-pick-item").forEach((el) => {
            el.addEventListener("click", async () => {
              const member = members.find((m) => m.uid === el.dataset.uid);
              const convId = await createOrGetConversation(member.uid, member);
              document.getElementById("newChatModal").classList.remove("open");
              openChat(convId, member.uid, member.username);
            });
          });
        });
      document
        .getElementById("closeNewChatModal")
        .addEventListener("click", () =>
          document.getElementById("newChatModal").classList.remove("open"),
        );

      // Initial load
      history.replaceState({ page: "list" }, "");
      renderSkeleton();
    </script>
  </body>
</html>
